name: cupf-agent

services:
  cupf_bot:
    build:
      context: .
      dockerfile_inline: |
        FROM agent-bot:latest AS agent_bot_runtime
        FROM cupf:latest

        ENV DEBIAN_FRONTEND=noninteractive
        ENV HOME=/root
        ENV PATH="/usr/local/bin:$${PATH}"

        RUN apt-get update && apt-get install -y --no-install-recommends \
              docker.io git ca-certificates curl clang-format \
            && rm -rf /var/lib/apt/lists/*

        RUN python3 -m pip install --no-cache-dir \
              "discord.py==2.6.4" "python-dotenv==1.2.2" "jsonschema==4.26.0" \
              black ruff

        COPY --from=agent_bot_runtime /usr/local/bin/node /usr/local/bin/node
        COPY --from=agent_bot_runtime /usr/local/bin/npm /usr/local/bin/npm
        COPY --from=agent_bot_runtime /usr/local/bin/npx /usr/local/bin/npx
        COPY --from=agent_bot_runtime /usr/local/bin/corepack /usr/local/bin/corepack
        COPY --from=agent_bot_runtime /usr/local/bin/claude /usr/local/bin/claude
        COPY --from=agent_bot_runtime /usr/local/bin/codex /usr/local/bin/codex
        COPY --from=agent_bot_runtime /usr/local/lib/node_modules /usr/local/lib/node_modules

        WORKDIR /agent_bot
        ENTRYPOINT ["python3", "-m", "agent_bot"]
        CMD ["bot", "--project", "cupf"]
    image: cupf-agent:latest
    container_name: cupf_bot
    command: ["bot", "--project", "cupf"]
    restart: on-failure:5
    user: "0:0"
    gpus:
      - driver: nvidia
        count: all
        capabilities: [gpu]
    shm_size: "16gb"
    working_dir: /agent_bot
    environment:
      HOME: /root
      WORK_DIR: ${WORK_DIR:-/home/robert00/Work}
      HOST_AGENT_DIR: ${AGENT_DIR:-/home/robert00/Work/agent}
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
      AGENT_PROJECT: cupf
      AGENT_REPO_MODE: local
      # /agent_bot is mounted read-only, so the bot's writable per-project
      # workspace (projects/<name>/{state,results,logs,staging}) must live OUTSIDE
      # it. paths.py reads WORKSPACE_ROOT from here; keep it in sync with the
      # /agent_state mount below.
      AGENT_WORKSPACE_DIR: /agent_state
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      # Common bot code (read-only) — shared across projects, edit without rebuild.
      # This also exposes projects/<name>.json (the deployment pointer) and secrets/.
      - ${AGENT_DIR:-/home/robert00/Work/agent}:/agent_bot:ro

      # Writable per-project workspace. WORKSPACE_ROOT=AGENT_WORKSPACE_DIR=/agent_state
      # (see above), so projects/cupf/ must be rw-mounted here, NOT under /agent_bot.
      - ${AGENT_DIR:-/home/robert00/Work/agent}/projects/cupf:/agent_state/cupf

      # Project repo + linked worktree. These paths must match agent/projects/cupf.json.
      - ${WORK_DIR:-/home/robert00/Work}/cuPF/gpu-powerflow:/workspace/gpu-powerflow:rw
      - ${WORK_DIR:-/home/robert00/Work}/cuPF/gpu-powerflow-master:/workspace/gpu-powerflow-master:rw

      # Subscription auth plus the project-local Claude hooks/settings.
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.codex:/root/.codex
      - ${AGENT_DIR:-/home/robert00/Work/agent}/.claude/hooks:/root/.claude/hooks:ro
      - ${AGENT_DIR:-/home/robert00/Work/agent}/.claude/settings.local.json:/root/.claude/settings.local.json:ro

      # Sibling experiment containers are launched through the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
